<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    <style>
        #calendar {
            max-width: 900px;
            margin: 40px auto;
        }

        .chart-container {
            max-width: 600px;
            margin: 40px auto;
            height: 400px; /* ← 高さはここで管理 */
        }

        .fc-event {
            color: white;
            font-weight: bold;
            border-radius: 6px;
        }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
        }

        .modal-content {
            background: white; 
            padding: 20px; 
            width: 300px; 
            margin: 15% auto; 
            border-radius: 10px; 
            text-align: center;
            z-index: 10000; 
            position: relative;
        }
    </style>

</head>

<body>

<h1>勉強時間記録アプリ</h1>

<h2>🔥 学習ストリーク</h2>
<p>現在：<span id="current"></span> 日</p>
<p>最長：<span id="max"></span> 日</p>
<p>今週の勉強時間：<span id="weekTotal">0</span> 分</p>
<p>今月の勉強時間：<span id="monthTotal">0</span> 分</p>

<hr>

<!-- カレンダー -->
<div id="calendar"></div>

<!-- モーダル -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>

        <button onclick="openEdit()">編集</button>
        <button onclick="deleteStudy()">削除</button>
        <button onclick="closeModal()">閉じる</button>

        <input type="hidden" id="eventId">
        <input type="hidden" id="eventTime">
    </div>
</div>

<hr>

<h2>週ごとの勉強時間</h2>
<div class="chart-container">
    <canvas id="weekChart"></canvas>
</div>

<h2>月ごとの勉強時間</h2>
<div class="chart-container">
    <canvas id="monthChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

/* =========================
   週グラフ（カレンダー連動版）
========================= */
let weekChart;

function loadWeeklyChart(calendar) {

    const currentDate = calendar.getDate();
    const currentMonth = currentDate.getMonth();
    const currentYear = currentDate.getFullYear();

    fetch('/api/weekly-summary')
        .then(res => res.json())
        .then(data => {

            const filtered = data.filter(d => {

                const [year, week] = d.week.split("-W");

                const y = parseInt(year);
                const w = parseInt(week);

                const simple = new Date(y, 0, 1 + (w - 1) * 7);
                const dayOfWeek = simple.getDay();

                const start = new Date(simple);

                if (dayOfWeek <= 4) {
                    start.setDate(simple.getDate() - simple.getDay() + 1);
                } else {
                    start.setDate(simple.getDate() + (8 - simple.getDay()));
                }

                const end = new Date(start);
                end.setDate(start.getDate() + 6);

                return (
                    (start.getMonth() === currentMonth && start.getFullYear() === currentYear) ||
                    (end.getMonth() === currentMonth && end.getFullYear() === currentYear)
                );
            });

            const labels = filtered.map(d => {

                const [year, week] = d.week.split("-W");

                const y = parseInt(year);
                const w = parseInt(week);

                const simple = new Date(y, 0, 1 + (w - 1) * 7);
                const dayOfWeek = simple.getDay();

                const start = new Date(simple);

                if (dayOfWeek <= 4) {
                    start.setDate(simple.getDate() - simple.getDay() + 1);
                } else {
                    start.setDate(simple.getDate() + (8 - simple.getDay()));
                }

                const end = new Date(start);
                end.setDate(start.getDate() + 6);

                const format = (date) => `${date.getMonth()+1}/${date.getDate()}`;

                return `${format(start)}〜${format(end)}`;
            });

            const values = filtered.map(d => d.total);

            const ctx = document.getElementById('weekChart').getContext('2d');

            if (weekChart) {
                weekChart.destroy(); // ← 再描画対策
            }

            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, "rgba(75, 192, 192, 1.0)");
            gradient.addColorStop(1, "rgba(75, 192, 192, 0.5)");

            weekChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '週ごとの勉強時間（分）',
                        data: values,
                        backgroundColor: gradient,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grace: '10%',
                            ticks: {
                                stepSize: 60
                            }
                        }
                    }
                }
            });
        });
}


fetch('/api/monthly-summary')
    .then(res => res.json())
    .then(monthData => {

        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;

        // 🔥 両方に対応
        const currentMonth = monthData.find(d => {
            const [y, m] = d.month.split("-");
            return parseInt(y) === year && parseInt(m) === month;
        });

        const monthTotal = currentMonth ? currentMonth.total : 0;

        document.getElementById("monthTotal").innerText = monthTotal;
    });

    fetch('/api/weekly-summary')
    .then(res => res.json())
    .then(weekData => {

        const now = new Date();
        const year = now.getFullYear();

        const onejan = new Date(year, 0, 1);
        const week = Math.ceil((((now - onejan) / 86400000) + onejan.getDay() + 1) / 7);

        const weekKey = `${year}-W${String(week).padStart(2, '0')}`;

        const currentWeek = weekData.find(d => d.week === weekKey);

        const weekTotal = currentWeek ? currentWeek.total : 0;

        document.getElementById("weekTotal").innerText = weekTotal;
    });








/* =========================
   月グラフ（そのまま）
========================= */
fetch('/api/monthly-summary')
    .then(res => res.json())
    .then(data => {

        const labels = data.map(d => {
            const [year, month] = d.month.split("-");
            return `${year}/${month}`;
        });

        const values = data.map(d => d.total);

        const ctx = document.getElementById('monthChart').getContext('2d');

        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, "rgba(255, 152, 0, 1.0)");
        gradient.addColorStop(1, "rgba(255, 152, 0, 0.5)");

        const max = Math.max(...values);

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: gradient,
                    borderRadius: 10,
                    barPercentage: 0.6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grace: '10%',
                        ticks: {
                            stepSize: Math.ceil(max / 5)
                        }
                    }
                }
            }
        });
    });


/* =========================
   カレンダー
========================= */
document.addEventListener('DOMContentLoaded', function () {

    const calendar = new FullCalendar.Calendar(
        document.getElementById('calendar'),
        {
            initialView: 'dayGridMonth',
            events: '/api/study-events',

            dateClick: function(info) {

                const time = prompt(info.dateStr + " の勉強時間（分）");

                if (time) {
                    fetch('/add-by-date', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: `time=${time}&date=${info.dateStr}`
                    }).then(() => calendar.refetchEvents());
                }
            },

            eventClick: function(info) {

                document.getElementById("editModal").style.display = "block";
                document.body.style.overflow = "hidden";

                document.getElementById("eventId").value = info.event.id;
                document.getElementById("eventTime").value = info.event.title.replace("分","");
                document.getElementById("modalTitle").innerText = info.event.title;
            }
        }
    );

    calendar.render();

    // 初回
    loadWeeklyChart(calendar);

    // 月移動で更新
    calendar.on('datesSet', function() {
        loadWeeklyChart(calendar);
    });
});

/* モーダル */
function closeModal() {
    document.getElementById("editModal").style.display = "none";
    document.body.style.overflow = "auto";
}

function openEdit() {

    const id = document.getElementById("eventId").value;
    const time = document.getElementById("eventTime").value;

    const newTime = prompt("新しい勉強時間（分）", time);
    if (!newTime) return;

    fetch("/update-time", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `id=${id}&time=${newTime}`
    }).then(() => location.reload());
}

function deleteStudy() {

    const id = document.getElementById("eventId").value;

    if (!confirm("削除しますか？")) return;

    fetch(`/delete-by-id?id=${id}`, {
        method: "POST"
    }).then(() => location.reload());
}

/* ストリーク */
fetch('/api/streak')
    .then(res => res.json())
    .then(data => {
        document.getElementById("current").innerText = data.current;
        document.getElementById("max").innerText = data.max;
    });

</script>

</body>
</html>
